<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 430" width="100%" height="100%">
  <defs>
    <linearGradient id="rainbowRoadLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3B30" />
      <stop offset="20%" stop-color="#FF9500" />
      <stop offset="40%" stop-color="#FFCC00" />
      <stop offset="60%" stop-color="#4CD964" />
      <stop offset="80%" stop-color="#5AC8FA" />
      <stop offset="100%" stop-color="#5856D6" />
    </linearGradient>
  </defs>
  <g id="logo-mark">
    <!-- 太陽 -->
    <circle cx="510" cy="130" r="65" fill="#F37021" opacity="0.15" />
    <g stroke="#F37021" stroke-width="4" stroke-linecap="round" opacity="0.4">
      <line x1="510" y1="50" x2="510" y2="30" />
      <line x1="460" y1="70" x2="445" y2="55" />
      <line x1="560" y1="70" x2="575" y2="55" />
    </g>
    <!-- レインボーロード -->
    <path d="M 240,230 C 390,230 450,210 510,170 C 570,130 650,130 740,130" stroke="url(#rainbowRoadLight)" stroke-width="18" stroke-linecap="round" fill="none" />
    <!-- マップピン -->
    <g id="map-pin">
      <path d="M 510,170 C 485,125 490,90 510,90 C 530,90 535,125 510,170 Z" fill="#0B2545" />
      <circle cx="510" cy="122" r="12" fill="#FFFFFF" />
      <circle cx="510" cy="122" r="5" stroke="url(#rainbowRoadLight)" stroke-width="2" fill="#0B2545" />
    </g>
    <!-- 自転車＆サイクリスト（間延びをなくしたスマート修正版） -->
    <g id="cyclist">
      <circle cx="380" cy="190" r="20" stroke="#0B2545" stroke-width="4.5" fill="none" />
      <circle cx="380" cy="190" r="3" fill="#0B2545" />
      <circle cx="455" cy="175" r="20" stroke="#0B2545" stroke-width="4.5" fill="none" />
      <circle cx="455" cy="175" r="3" fill="#0B2545" />
      <path d="M 380,190 L 415,190 L 400,150 Z M 415,190 L 435,145 L 400,150 M 435,145 L 455,175" stroke="#0B2545" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <line x1="400" y1="145" x2="425" y2="115" stroke="#0B2545" stroke-width="10" stroke-linecap="round" />
      <line x1="425" y1="115" x2="435" y2="145" stroke="#0B2545" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" />
      <polyline points="400,145 420,165 415,190" stroke="#0B2545" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      <circle cx="433" cy="103" r="7" fill="#0B2545" />
    </g>
    <!-- スピードライン -->
    <g id="speed-wind" opacity="0.7">
      <path d="M 320,185 L 280,185 A 5,5 0 1,1 285,178" stroke="#FF9500" stroke-width="3.5" stroke-linecap="round" fill="none" />
      <path d="M 300,200 L 260,200 A 5,5 0 1,1 265,193" stroke="#0B2545" stroke-width="3.5" stroke-linecap="round" fill="none" />
    </g>
  </g>
  <!-- テキストロゴ -->
  <g id="logo-text">
    <text font-family="sans-serif" font-size="52" text-anchor="middle" x="420" y="325" font-weight="900" fill="#0B2545">meguri<tspan fill="url(#rainbowRoadLight)">-</tspan><tspan fill="#F37021" font-weight="800">cycle</tspan></text>
    <text font-family="sans-serif" font-size="20" fill="#0B2545" font-weight="900" x="625" y="325">.com</text>
    <text font-family="sans-serif" font-size="15" fill="#0B2545" font-weight="600" letter-spacing="0.25em" text-anchor="middle" x="420" y="368">めぐる。つながる。冒険の旅へ。</text>
    <text font-family="sans-serif" font-size="11" font-weight="800" letter-spacing="0.4em" text-anchor="middle" fill="#A0AEC0" x="430" y="405">BY RAINBOW</text>
  </g>
</svg>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- LINE リッチメニュー画像用ファイル (2500×1686)
       headless Chrome または DevTools でスクリーンショットを撮影 -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 2500px;
      height: 1686px;
      background: url('line-richmenu-bg.png') no-repeat center / cover;
      font-family: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", sans-serif;
      overflow: hidden;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      width: 100%;
      height: 100%;
      gap: 8px;
      padding: 8px;
    }

    /* ── 共通セル（背景画像に描かれたアイコンの下に文字だけ重ねる） ── */
    .cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      padding: 0 36px 66px;
    }

    /* ── テキスト ── */
    .label {
      font-size: 108px;
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.01em;
      white-space: nowrap;
      text-shadow: 0 3px 14px rgba(0,0,0,0.35);
    }

    .sub {
      font-size: 46px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      text-align: center;
      line-height: 1.35;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    /* ── 無料バッジ ── */
    .badge {
      position: absolute;
      top: 32px;
      right: 36px;
      background: #fff;
      color: #C62828;
      font-size: 42px;
      font-weight: 900;
      padding: 12px 34px;
      border-radius: 999px;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>
  <div class="grid">

    <!-- 1: 赤パネル（自転車アイコン）→ 買取査定 -->
    <div class="cell">
      <span class="badge">査定 無料</span>
      <div class="label">買取査定</div>
      <div class="sub">写真を送るだけ・査定無料</div>
    </div>

    <!-- 2: オレンジパネル（トラックアイコン）→ 出張引取 -->
    <div class="cell">
      <div class="label">出張引取</div>
      <div class="sub">処分費0円・出張費のみ</div>
    </div>

    <!-- 3: 黄パネル（カメラアイコン）→ 写真を送る -->
    <div class="cell">
      <div class="label" style="color:#14251c; text-shadow:none;">写真を送る</div>
      <div class="sub" style="color:rgba(0,0,0,0.62); text-shadow:none;">ここに送るだけでOK</div>
    </div>

    <!-- 4: 緑パネル（地図ピンアイコン）→ 対応エリア -->
    <div class="cell">
      <div class="label">対応エリア</div>
      <div class="sub">石川県中心・北陸対応</div>
    </div>

    <!-- 5: 青パネル（吹き出しアイコン）→ よくある質問 -->
    <div class="cell">
      <div class="label">よくある質問</div>
      <div class="sub">FAQ・お問い合わせ</div>
    </div>

    <!-- 6: 紫パネル（家アイコン）→ 公式サイト -->
    <div class="cell">
      <div class="label">公式サイト</div>
      <div class="sub">サービスの詳細はこちら</div>
    </div>

  </div>
</body>
</html>

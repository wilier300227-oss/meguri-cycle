<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Instagram投稿用 1080×1080 -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@700;900&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px; height: 1080px;
      background: #1a2a28;
      font-family: "Zen Kaku Gothic New", sans-serif;
      color: #fff;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rainbow-top {
      height: 16px; flex-shrink: 0;
      background: linear-gradient(90deg, #E53935 0%, #FB8C00 20%, #FDD835 40%, #43A047 55%, #1E88E5 72%, #8E24AA 100%);
    }
    .main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 40px; padding: 60px 80px; text-align: center;
    }
    .eyebrow {
      font-size: 40px; font-weight: 900; letter-spacing: 0.1em;
      color: #69F0AE;
    }
    .huge {
      font-family: "Zen Old Mincho", serif;
      font-size: 96px; font-weight: 900; line-height: 1.3;
    }
    .huge .zero {
      font-size: 190px;
      background: linear-gradient(135deg, #FDD835, #FB8C00);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub {
      font-size: 38px; font-weight: 700; color: rgba(255,255,255,0.85);
      line-height: 1.7;
    }
    .point {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 30px 48px;
      font-size: 33px; font-weight: 700; line-height: 1.7;
      color: rgba(255,255,255,0.9);
    }
    .footer {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 70px 48px;
      font-size: 30px; font-weight: 700; color: rgba(255,255,255,0.6);
    }
    .brand { font-family: "Zen Old Mincho", serif; font-size: 38px; color: #fff; }
  </style>
</head>
<body>
  <div class="rainbow-top"></div>
  <div class="main">
    <div class="eyebrow">値段がつかない自転車も</div>
    <div class="huge">処分費 <span class="zero">0</span>円</div>
    <div class="sub">サビだらけでも、動かなくても大丈夫。<br>資源としてリサイクルするので、状態は問いません。</div>
    <div class="point">出張費（1,000円〜）のみで引取に伺います。<br>防犯登録の抹消手続きも代行します。</div>
  </div>
  <div class="footer">
    <div class="brand">めぐり自転車</div>
    <div>石川県中心・北陸対応 ♻️</div>
  </div>
</body>
</html>

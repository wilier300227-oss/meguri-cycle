<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- Instagram投稿用 1080×1080 -->
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@700;900&family=Zen+Old+Mincho:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px; height: 1080px;
      background: #f7f5f0;
      font-family: "Zen Kaku Gothic New", sans-serif;
      color: #1a2a28;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .rainbow-top {
      height: 16px; flex-shrink: 0;
      background: linear-gradient(90deg, #E53935 0%, #FB8C00 20%, #FDD835 40%, #43A047 55%, #1E88E5 72%, #8E24AA 100%);
    }
    .main {
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; gap: 44px; padding: 60px 90px;
    }
    .title {
      font-family: "Zen Old Mincho", serif;
      font-size: 76px; font-weight: 900; text-align: center;
      margin-bottom: 12px;
    }
    .step {
      display: flex; align-items: center; gap: 36px;
      background: #fff; border-radius: 24px;
      padding: 36px 44px;
      box-shadow: 0 4px 20px rgba(26,42,40,0.08);
    }
    .num {
      width: 96px; height: 96px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .step:nth-child(2) .num { background: #E53935; }
    .step:nth-child(3) .num { background: #FB8C00; }
    .step:nth-child(4) .num { background: #43A047; }
    .step-body h3 { font-size: 44px; font-weight: 900; margin-bottom: 6px; }
    .step-body p { font-size: 30px; color: rgba(26,42,40,0.6); font-weight: 700; }
    .note {
      text-align: center; font-size: 30px; font-weight: 700;
      color: rgba(26,42,40,0.55); margin-top: 8px;
    }
    .footer {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 70px 44px;
      font-size: 30px; font-weight: 700; color: rgba(26,42,40,0.5);
    }
    .brand { font-family: "Zen Old Mincho", serif; font-size: 38px; color: #1a2a28; }
  </style>
</head>
<body>
  <div class="rainbow-top"></div>
  <div class="main">
    <div class="title">買取はLINEで完結</div>
    <div class="step">
      <div class="num">1</div>
      <div class="step-body">
        <h3>写真を送る</h3>
        <p>LINEで自転車の写真を送るだけ。持ち込み不要</p>
      </div>
    </div>
    <div class="step">
      <div class="num">2</div>
      <div class="step-body">
        <h3>査定額のご連絡</h3>
        <p>48時間以内に確定額でご案内。減額なし</p>
      </div>
    </div>
    <div class="step">
      <div class="num">3</div>
      <div class="step-body">
        <h3>ご自宅で受け渡し</h3>
        <p>訪問・書類・お支払いまでその場で完了</p>
      </div>
    </div>
    <div class="note">査定・出張・防犯登録の抹消代行まで、買取なら費用は一切かかりません</div>
  </div>
  <div class="footer">
    <div class="brand">めぐり自転車</div>
    <div>プロフィールのリンクからどうぞ 🚲</div>
  </div>
</body>
</html>
